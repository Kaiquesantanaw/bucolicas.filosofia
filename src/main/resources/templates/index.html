<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucólicas Filosóficas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: cabecalho}"></header>

<main>
    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bucólicas Filosóficas</h1>
            <p class="hero-sub">Um espaço de reflexão, questionamento e sabedoria.</p>
            <a th:href="@{/ensaios}" class="btn-hero">Explorar Ensaios</a>
        </div>
    </section>

    <!-- Citação em destaque -->
    <section class="quote-section">
        <blockquote>
            "Só sei que nada sei."
            <cite>— Sócrates</cite>
        </blockquote>
    </section>

    <!-- Ensaios recentes -->
    <section class="section-recentes">
        <div class="container">
            <h2>Ensaios Recentes</h2>
            <div class="cards-grid" th:if="${not #lists.isEmpty(ensaios)}">
                <article class="card" th:each="ensaio, iter : ${ensaios}" th:if="${iter.index < 3}">
                    <h3 th:text="${ensaio.titulo}">Título</h3>
                    <p class="card-autor" th:text="${ensaio.autorFilosofo}">Filósofo</p>
                    <p class="card-preview" th:text="${#strings.abbreviate(ensaio.conteudo, 150)}">Prévia...</p>
                    <a th:href="@{/ensaios/{id}(id=${ensaio.id})}" class="btn-ler">Ler ensaio →</a>
                </article>
            </div>
            <div th:if="${#lists.isEmpty(ensaios)}" class="empty-state">
                <p>Nenhum ensaio publicado ainda.</p>
                <a th:href="@{/ensaios/novo}" class="btn-novo">Criar o primeiro ensaio</a>
            </div>
            <div class="ver-todos" th:if="${not #lists.isEmpty(ensaios)}">
                <a th:href="@{/ensaios}">Ver todos os ensaios →</a>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: rodape}"></footer>

</body>
</html>
