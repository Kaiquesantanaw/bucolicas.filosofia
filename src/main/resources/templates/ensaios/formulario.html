<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${ensaio.id} ? 'Editar Ensaio' : 'Novo Ensaio'">Ensaio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: cabecalho}"></header>

<main>
    <section class="page-hero">
        <div class="container">
            <h1 th:text="${ensaio.id} ? 'Editar Ensaio' : 'Novo Ensaio'">Ensaio</h1>
        </div>
    </section>

    <section class="section-form">
        <div class="container form-container">
            <a th:href="@{/ensaios}" class="btn-voltar">← Voltar</a>
            <form th:action="@{/ensaios/salvar}" th:object="${ensaio}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" th:field="*{titulo}"
                           placeholder="Título do ensaio" required>
                </div>

                <div class="form-group">
                    <label for="autorFilosofo">Autor / Filósofo</label>
                    <input type="text" id="autorFilosofo" th:field="*{autorFilosofo}"
                           placeholder="Nome do filósofo ou autor">
                </div>

                <div class="form-group">
                    <label for="conteudo">Conteúdo</label>
                    <textarea id="conteudo" th:field="*{conteudo}"
                              rows="12" placeholder="Escreva o ensaio filosófico aqui..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-salvar">Salvar Ensaio</button>
                    <a th:href="@{/ensaios}" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: rodape}"></footer>

</body>
</html>
