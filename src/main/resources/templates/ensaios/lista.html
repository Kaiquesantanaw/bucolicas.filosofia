<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensaios — Bucólicas Filosóficas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: cabecalho}"></header>

<main>
    <section class="page-hero">
        <div class="container">
            <h1>Ensaios Filosóficos</h1>
            <p>Reflexões, análises e pensamentos sobre filosofia.</p>
        </div>
    </section>

    <section class="section-lista">
        <div class="container">
            <div class="cards-grid" th:if="${not #lists.isEmpty(ensaios)}">
                <article class="card" th:each="ensaio : ${ensaios}">
                    <h3 th:text="${ensaio.titulo}">Título</h3>
                    <p class="card-autor" th:if="${ensaio.autorFilosofo}" th:text="${ensaio.autorFilosofo}">Filósofo</p>
                    <p class="card-data" th:if="${ensaio.dataCriacao}"
                       th:text="${#temporals.format(ensaio.dataCriacao, 'dd/MM/yyyy')}">Data</p>
                    <p class="card-preview" th:text="${#strings.abbreviate(ensaio.conteudo, 200)}">Prévia...</p>
                    <div class="card-actions">
                        <a th:href="@{/ensaios/{id}(id=${ensaio.id})}" class="btn-ler">Ler →</a>
                    </div>
                </article>
            </div>
            <div th:if="${#lists.isEmpty(ensaios)}" class="empty-state">
                <p>Nenhum ensaio publicado ainda.</p>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: rodape}"></footer>

</body>
</html>
