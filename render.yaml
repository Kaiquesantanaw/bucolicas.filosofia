databases:
  - name: bucolicasfilos-db
    databaseName: bucolicasfilos
    user: bucolicasfilos
    plan: free

services:
  - type: web
    name: bucolicasfilos-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bucolicasfilos-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
